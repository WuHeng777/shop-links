<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>精選便宜好物</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: #f3f3f3;
      color: #111;
      text-align: center;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 36px 20px 50px;
    }

    h1 {
      font-size: 30px;
      margin-bottom: 14px;
      font-weight: 800;
    }

    .subtitle {
      font-size: 17px;
      color: #666;
      line-height: 1.7;
      margin-bottom: 30px;
    }

    .section-title {
      text-align: left;
      font-size: 14px;
      color: #888;
      margin: 24px 0 12px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .btn {
      display: block;
      background: #111;
      color: #fff;
      text-decoration: none;
      padding: 18px 16px;
      border-radius: 16px;
      margin-bottom: 14px;
      font-size: 17px;
      font-weight: 700;
      line-height: 1.5;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
    }

    .btn span {
      display: block;
      font-size: 13px;
      font-weight: 400;
      color: #d6d6d6;
      margin-top: 4px;
    }

    .note {
      margin-top: 28px;
      font-size: 15px;
      color: #7a7a7a;
      line-height: 1.7;
    }

    .page-link {
      display: inline-block;
      margin-top: 18px;
      font-size: 15px;
      color: #111;
      text-decoration: none;
      border-bottom: 1px solid #111;
      padding-bottom: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔥 精選便宜好物</h1>
    <div class="subtitle">
      我幫你挑過的，<br>
      不踩雷才放上來。
    </div>

    <div class="section-title">今日推薦</div>

    <a class="btn" href="你的蝦皮分潤連結1" target="_blank">
      除毛神器｜衣服沙發一刷就乾淨
      <span>養貓養狗、長髮家庭很適合</span>
    </a>

    <a class="btn" href="你的蝦皮分潤連結2" target="_blank">
      懶人拖地神器｜省力又好清
      <span>不用彎腰，日常打掃更輕鬆</span>

      收納神器｜小空間瞬間整齊

    <div class="note">
      持續更新中｜追蹤粉專看更多好物

    <a class="page-link" href="你的粉專連結" target="_blank">查看我的 Facebook 粉專</a>

</html>
